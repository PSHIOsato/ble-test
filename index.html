<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>LiBecoM検出</title>
</head>

<body>

<h1>ランチクーポン表示</h1>

<button onclick="connectBLE()">
LiBecoMを探す
</button>

<p id="result">
飲食店でLiBecoMと接続して、お会計時に提示すると割引されます。<br>
対象店舗　：　電工食堂<br>
※11時に社用携帯に配布
</p>

<img id="photo"
     src="https://PSHIOsato.github.io/ble-test/couponA.jpg"
     style="max-width:100%; height:auto;">

<script>
async function connectBLE() {
  try {
     const device = await navigator.bluetooth.requestDevice({
       filters: [
         { namePrefix: "LiBecoM" }
       ]
     });

    const name = device.name || "";

    if (name.includes("LiBecoM")) {
      document.getElementById("result").innerHTML =
        "LiBecoM発見！ ランチ割引表示中<br>今月の残食事補助額：２５００円";

      document.getElementById("photo").src =
        "https://PSHIOsato.github.io/ble-test/bill.jpg";

    } else {
      document.getElementById("result").innerHTML =
        "LiBecoMではありません : " + name;

      document.getElementById("photo").src =
        "https://PSHIOsato.github.io/ble-test/couponA.jpg";
    }

  } catch (err) {
    document.getElementById("result").innerHTML =
      "エラー : " + err;

    document.getElementById("photo").src =
      "https://PSHIOsato.github.io/ble-test/couponA.jpg";
  }
}
</script>

</body>
</html>
