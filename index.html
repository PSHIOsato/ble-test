<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>LiBecoM BLE検出</title>
</head>
<body>
<h1>LiBecoM BLE検出テスト</h1>
<button onclick="connectBLE()">
LiBecoMを探す
</button>
 
<p id="result">
未接続
</p>
 
https://picsum.photos/600/400
 
<script>
async function connectBLE() {
  try {
    document.getElementById("result").innerHTML =
    "LiBecoMを検索中...";
    const device = await navigator.bluetooth.requestDevice({
    filters: [
    {
      namePrefix: "LiBecoM"
    }
  ]
});
  const name = device.name || "";
  if (name.includes("LiBecoM")) {
  document.getElementById("result").innerHTML =
  "LiBecoM発見！ 機器名: " + name;
  document.getElementById("photo").style.display =
  "block";
    } else {
      document.getElementById("result").innerHTML =
      "LiBecoMではない機器です: " + (name || "名称なし");
    }
  } catch (err) {
    document.getElementById("result").innerHTML =
    "エラー: " + err;
  }
}
</script>
</body>
</html>
