<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BLEテスト</title>
</head>
<body>
 
<h1>BLEテスト</h1>
 
<button onclick="connectBLE()">BLE接続</button>
 
<p id="result">未接続</p>
 
<script>
 
async function connectBLE() {
 
try {
 
const device = await navigator.bluetooth.requestDevice({
acceptAllDevices: true
});
 
document.getElementById("result").innerHTML =
"発見: " + (device.name || "名称なし");
 
} catch(err) {
 
document.getElementById("result").innerHTML =
"エラー: " + err;
 
}
 
}
 
</script>
</body>
</html>
