<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>LiBecoM検出</title>
</head>
<body>
 
<h1>ランチクーポン表示</h1>
 
<button onclick="connectBLE()">
LiBecoMを探す
</button>
 
<p id="result">
LiBecoM待機中
</p>
 
photo_OUT.jpg
 
<script>
 
async function connectBLE() {
try {
const device = await navigator.bluetooth.requestDevice({
acceptAllDevices: true
});
const name = device.name || "";
if (name.includes("LiBecoM")) {
document.getElementById("result").innerHTML =
"LiBecoM発見！ ランチ割引表示中";
document.getElementById("photo").src =
"photo_IN.jpg";
}
else {
document.getElementById("result").innerHTML =
"LiBecoMではありません : " + name;
document.getElementById("photo").src =
"photo_OUT.jpg";
}
}
catch(err) {
document.getElementById("result").innerHTML =
"エラー : " + err;
document.getElementById("photo").src =
"photo_OUT.jpg";
}
}
</script>
</body>
</html>
